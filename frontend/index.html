<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRD AI</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>MRD AI</h1>
            <p>Ask anything about MRD</p>
        </div>

        <div class="chat-container" id="chat-container">

            <div class="message bot">
                Hello! I'm MRD AI. Ask me anything about MRD's projects, experience, and skills.
            </div>

        </div>

        <div class="input-container">

            <textarea
                    id="message-input"
                    placeholder="Message MRD AI..."
                    rows="1"></textarea>

            <button id="send-btn">
                Send
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
